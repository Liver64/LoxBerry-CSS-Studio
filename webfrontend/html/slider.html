<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquid Glass Slider</title>

<style>

html{
    box-sizing:border-box;
}

*,
*::before,
*::after{
    margin:0;
    padding:0;
    box-sizing:inherit;
}

body{
    font-family:Inter,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;

    background:
        linear-gradient(
            135deg,
            #4facfe 0%,
            #00f2fe 50%,
            #8b5cf6 100%
        );
}

.slider-wrapper{
    width:420px;
}

.slider-container{
    position:relative;
	overflow:visible;
    height:8px;

    background:rgba(255,255,255,.25);

    border-radius:999px;

    backdrop-filter:blur(12px);
}

.slider-progress{
    position:absolute;
    left:0;
    top:0;

    height:100%;
    width:0;
	z-index:1;

    border-radius:999px;

    background:
        linear-gradient(
            117deg,
            #49a3fc,
            #3681ee
        );
}

.slider-thumb-glass{
    position:absolute;
    left:0;
    top:50%;

    width:48px;
    height:30px;
	
	z-index:20;

    transform:translate(-50%,-50%);

    border-radius:999px;
	
	will-change: transform;
    transform-style: preserve-3d;

	background:rgba(255,255,255,.65);   // Einstellung Slider Punkt Transparenz im Ruhezustand

    overflow:visible;

    cursor:pointer;

    box-shadow:
        0 1px 8px rgba(0,30,63,.15),
        0 0 2px rgba(0,9,20,.1);

    transition:
    transform .15s ease,
    background .15s ease,
    opacity .15s ease;
}

.slider-thumb-glass:hover{
    transform:
        translate(-50%,-50%)
        scale(1.03);
}

.slider-thumb-glass:active{
    transform:
        translate(-50%,-50%)
        scaleX(1.1)
        scaleY(.98);
}

/* Tooltip */

.slider-tooltip{
    position:absolute;

    left:50%;
    top:-45px;

    transform:translateX(-50%);

    min-width:60px;

    text-align:center;
	
	z-index:100;

    padding:6px 12px;

    color:white;

    font-weight:700;
    font-size:14px;

    border-radius:999px;

    background:
        rgba(255,255,255,.18);

    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);

    border:
        1px solid rgba(255,255,255,.35);

    box-shadow:
        0 8px 24px rgba(0,0,0,.18);

    pointer-events:none;
	
	
	opacity:1 !important;
    display:block !important;

}

.slider-tooltip::after{
    content:"";

    position:absolute;

    left:50%;
    bottom:-6px;

    width:12px;
    height:12px;

    transform:
        translateX(-50%)
        rotate(45deg);

    background:
        rgba(255,255,255,.18);

    backdrop-filter:blur(16px);
}

/* Liquid Glass Effekt */

.slider-thumb-glass-filter{
    position:absolute;
    inset:-2px;
	
	pointer-events:none;
	border-radius:999px;

    overflow:hidden;

	will-change: filter;
	
    filter:url(#mini-liquid-lens);

    backdrop-filter:blur(1px);
    -webkit-backdrop-filter:blur(1px);

    opacity:0;
}

.slider-thumb-glass-overlay{
    position:absolute;
    inset:0;

    background:
        rgba(255,255,255,.14);

    opacity:0;
}

.slider-thumb-glass-specular{
    position:absolute;
    inset:0;

    border-radius:inherit;

    box-shadow:
        inset 1px 1px 0 rgba(255,255,255,.7),
        inset 0 0 22px rgba(255,255,255,.6),
        inset -1px -1px 0 rgba(69,168,243,.12);

    opacity:0;
}

.slider-thumb-glass.active{
    background:rgba(255,255,255,.05);
}

.slider-thumb-glass.active .slider-thumb-glass-filter,
.slider-thumb-glass.active .slider-thumb-glass-overlay,
.slider-thumb-glass.active .slider-thumb-glass-specular{
    border-radius:999px;
}


.min-max{
    display:flex;
    justify-content:space-between;

    margin-top:15px;

    color:white;

    font-weight:600;

    text-shadow:
        0 2px 10px rgba(0,0,0,.2);
}

</style>
</head>
<body>

<div class="slider-wrapper">

    <div class="slider-container" id="slider">

        <div class="slider-progress" id="progress"></div>

        <div class="slider-thumb-glass" id="thumb">

            <div class="slider-tooltip" id="currentValue">
                0
            </div>

            <div class="slider-thumb-glass-filter"></div>
            <div class="slider-thumb-glass-overlay"></div>
            <div class="slider-thumb-glass-specular"></div>

        </div>

    </div>

    <div class="min-max">
        <span id="minLabel"></span>
        <span id="maxLabel"></span>
    </div>

</div>

<svg width="0" height="0">
    <filter id="mini-liquid-lens"
            x="-50%"
            y="-50%"
            width="200%"
            height="200%">

        <feImage
            result="normalMap"
            preserveAspectRatio="none"
            xlink:href="data:id='invmap'
                                    cx='50%'
                                    cy='50%'
                                    r='75%'>
                        <stop offset='0%' stop-color='rgb(128,128,255)'/>
                        <stop offset='90%' stop-color='rgb(255,255,255)'/>
                    </radialGradient>
                </defs>

                <rect width='100%'
                      height='100%'
                      fill='url(%23invmap)'/>
            </svg>" />

        <feDisplacementMap
            in="SourceGraphic"
            in2="normalMap"
            scale="-235"
            xChannelSelector="R"
            yChannelSelector="G"/>

    </filter>
</svg>

<script>

/*
===================================
KONFIGURATION
===================================
*/

const min = 0;
const max = 500;
const step = 5;
const startValue = 175;

/* Tooltip */

const valuePrefix = "";
const valueSuffix = "€";

/* Min/Max Anzeige */

const rangePrefix = "";
const rangeSuffix = "€";

/*
===================================
*/

const slider = document.getElementById("slider");
const thumb = document.getElementById("thumb");
const progress = document.getElementById("progress");

const valueDisplay =
    document.getElementById("currentValue");

const minLabel =
    document.getElementById("minLabel");

const maxLabel =
    document.getElementById("maxLabel");

let isDragging = false;
let sliderRect;
let currentValue = startValue;

function formatValue(value){
    return `${valuePrefix}${value.toLocaleString("de-DE")}${valueSuffix}`;
}

function formatRangeValue(value){
    return `${rangePrefix}${value.toLocaleString("de-DE")}${rangeSuffix}`;
}

minLabel.textContent =
    formatRangeValue(min);

maxLabel.textContent =
    formatRangeValue(max);

function snap(value){
    return Math.round(value / step) * step;
}

function valueToPercent(value){
    return ((value - min) / (max - min)) * 100;
}

function percentToValue(percent){

    let value =
        min +
        ((max - min) * percent / 100);

    value = snap(value);

    return Math.max(
        min,
        Math.min(max, value)
    );
}

function setValue(value){

    value = snap(value);

    value = Math.max(
        min,
        Math.min(max, value)
    );

    currentValue = value;

    const percent =
        valueToPercent(value);

    progress.style.width =
        `${percent}%`;

    
	const x =
		sliderRect.width * percent / 100;

	thumb.style.left = `${x}px`;

    valueDisplay.textContent =
        formatValue(value);
}

function updatePosition(clientX){

    let percent =
        ((clientX - sliderRect.left)
        / sliderRect.width) * 100;

    percent = Math.max(
        0,
        Math.min(100, percent)
    );

    setValue(
        percentToValue(percent)
    );
}

thumb.addEventListener("mousedown", () => {

    sliderRect =
        slider.getBoundingClientRect();

    isDragging = true;

    thumb.classList.add("active");

});

document.addEventListener("mousemove", e => {

    if(!isDragging) return;

    updatePosition(e.clientX);

});

document.addEventListener("mouseup", () => {

    isDragging = false;

    thumb.classList.remove("active");

});

slider.addEventListener("mousedown", e => {

    sliderRect =
        slider.getBoundingClientRect();

    updatePosition(e.clientX);

});

thumb.addEventListener("touchstart", () => {

    sliderRect =
        slider.getBoundingClientRect();

    isDragging = true;

    thumb.classList.add("active");

});

document.addEventListener("touchmove", e => {

    if(!isDragging) return;

    updatePosition(
        e.touches[0].clientX
    );

});

document.addEventListener("touchend", () => {

    isDragging = false;

    thumb.classList.remove("active");

});

slider.addEventListener("touchstart", e => {

    sliderRect =
        slider.getBoundingClientRect();

    updatePosition(
        e.touches[0].clientX
    );

});

window.addEventListener("resize", () => {

    sliderRect =
        slider.getBoundingClientRect();

    setValue(currentValue);

});

sliderRect =
    slider.getBoundingClientRect();

setValue(startValue);
</script>

</body>
</html>
